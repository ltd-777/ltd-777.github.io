<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>春韵图书网站</title>
    <link rel="stylesheet"href="css/lab2-2501-009-index.css">
</head>
<body>
    <div class="header">
        <div class="logo">
            <img src="img/图书馆logo.jpg"alt="网站Logo"class="图书馆logo">
        </div>
        <ul class="nav">
            <li><a href="#">首页</a></li>
            <li><a href="#">图书分类</a></li>
            <li><a href="#">新书上架</a></li>
            <li><a href="#">热销排行</a></li>
            <li><a href="#">关于我们</a></li>
        </ul>
    </div>
    <div class="container">
        <div class="left-sidebar">
            <h3>图书分类</h3>
            <ul>
                <li><a href="#">文学小说</a></li>
                <li><a href="#">经营励志</a></li>
                <li><a href="#">科技计算机</a></li>
                <li><a href="#">少儿读物</a></li>
                <li><a href="#">历史人文</a></li>
            </ul>
            <img src="img/sidebar-ad.jpg"alt="分类广告"class="sidebar-ad">
        </div>
        <div class="main-content">
            <div class="hot-recommend">
                <h3>热门推荐</h3>
                <div class="book-item">
                    <img src="img/book1.jpg"alt="《活着》封面">
                    <span class="hot-label">热销</span>
                    <p>《活着》</p>
                </div>
                <div class="book-item">
                    <img src="img/book2.jpg"alt="《三体》封面">
                    <span class="hot-label">热销</span>
                    <p>《三体》</p>
                </div>
                <div class="book-item">
                    <img src="img/book3.jpg"alt="《百年孤独》封面">
                    <p>《百年孤独》</p>
                </div>
                <div class="book-item">
                    <img src="img/book4.jpg"alt="《小王子》封面">
                    <p>《小王子》</p>
                </div>
            </div>
            <div class="new-books">
                <h3>新书上市</h3>
                <table border="1">
                    <tr>
                        <th>封面</th>
                        <th>书名</th>
                        <th>作者</th>
                        <th>价格</th>
                    </tr>
                    <tr>
                        <td><img src="img/new1.jpg"alt="《卢克名的偷偷一笑》"class="table-book-img"></td>
                        <td>《卢克名的偷偷一笑》</td>
                        <td>余华</td>
                        <td>¥39.99</td>
                    </tr>
                    <tr>
                        <td><img src="img/new2.jpg"alt="《长安的荔枝》"class="table-book-img"></td>
                        <td>《长安的荔枝》</td>
                        <td>马伯庸</td>
                        <td>¥42.00</td>
                    </tr>
                </table>
            </div>
        </div>
        <div class="right-sidebar">
            <h3>促销活动</h3>
            <img src="img/sale-ad.jpg"alt="促销广告"class="sale-img">
            <p>全场满99减20</p>
            <p>限时折扣图书5折起</p>
        </div>
    </div>
</body>
</html>
